<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USULAN MUSRENA 2027 - Peta Banda Aceh</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#eef2f7;overflow:hidden}
header{height:80px;background:#0a4d91;color:#fff;display:flex;align-items:center;padding:0 20px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header img{height:56px;margin-right:16px}
header h1{font-size:28px}
header p{font-size:14px}
.main{height:calc(100vh - 80px);padding:15px}
.mapbox{position:relative;height:100%;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.legend{position:absolute;left:15px;top:15px;background:#fff;padding:12px 15px;border-radius:10px;z-index:10;font-size:13px;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.legend b{display:block;margin-bottom:8px}
.toolbar{position:absolute;right:15px;top:15px;display:flex;flex-direction:column;gap:8px;z-index:10}
.toolbar button{width:48px;height:48px;border:none;border-radius:10px;background:#0a4d91;color:#fff;font-size:20px;cursor:pointer}
.status{position:absolute;left:15px;bottom:15px;background:#0a4d91;color:#fff;padding:10px 16px;border-radius:30px;z-index:10}
.back{position:absolute;left:15px;top:145px;z-index:10;background:#0a4d91;color:#fff;text-decoration:none;padding:10px 18px;border-radius:8px}
#mapContainer{width:100%;height:100%;display:flex;justify-content:center;align-items:center;overflow:hidden;cursor:grab}
#mapContainer{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    cursor:grab;
    touch-action:none;}
#mapLayer{position:relative}
#mapImage{max-width:none;display:block;user-select:none}
.hotspot{position:absolute;border:2px solid rgba(0,0,0,.25);border-radius:8px;cursor:pointer;z-index:999}
.hotspot.green{background:rgba(0,180,0,.25)}
.hotspot.yellow{background:rgba(255,230,0,.30)}
.hotspot.orange{background:rgba(255,165,0,.30)}
.hotspot.red{background:rgba(255,0,0,.30)}
.hotspot:hover{outline:2px solid #000}
.tooltip{display:none;position:absolute;top:-30px;left:0;background:#222;color:#fff;padding:4px 8px;border-radius:5px;font-size:12px;white-space:nowrap}
.hotspot:hover .tooltip{display:block}
#hs-peuniti{left:46.5%;top:60.8%;width:80px;height:300px}
#hs-pangoraya{left:63%;top:72.2%;width:200px;height:200px}
</style>
</head>
<body>
<header>
<img src="images/logo_bna.png"><div><h1>USULAN MUSRENA 2027</h1><p>Pemerintah Kota Banda Aceh</p></div>
</header>
<div class="main"><div class="mapbox">
<div class="legend"><b>Legenda</b>
<div>🟩 1 Usulan</div><div>🟨 2 Usulan</div><div>🟧 3 Usulan</div><div>🟥 4 Usulan</div>
</div>
<a class="back" href="index.html"><< Kembali</a>
<div class="toolbar">
<button onClick="zoomIn()">+</button><button onClick="zoomOut()">−</button><button onClick="resetMap()">⌂</button>
</div>
<div class="status" id="status">Status : Arahkan mouse ke hotspot gampong</div>
<div id="mapContainer"><div id="mapLayer">
<img id="mapImage" src="images/peta_bna.jpg" draggable="false">

<a href="hotspot/peuniti.html" class="hotspot orange" id="hs-peuniti"
onmouseenter="setStatus('Peuniti - 3 usulan')" onmouseleave="clearStatus()">
<div class="tooltip">Peuniti (3 Usulan)</div></a>

<a href="hotspot/pangoraya.html" class="hotspot yellow" id="hs-pangoraya"
onmouseenter="setStatus('Pango Raya - 2 usulan')" onmouseleave="clearStatus()">
<div class="tooltip">Pango Raya (2 Usulan)</div></a>

</div></div>
</div></div>
<script>
const layer=document.getElementById('mapLayer');
const c=document.getElementById('mapContainer');
const status=document.getElementById('status');
let scale=1,x=0,y=0,drag=false,sx=0,sy=0;
function render(){layer.style.transform=`translate(${x}px,${y}px) scale(${scale})`;}
function zoomIn(){scale+=0.2;render();}
function zoomOut(){scale=Math.max(.5,scale-.2);render();}
function resetMap(){scale=1;x=0;y=0;render();}
function setStatus(t){status.innerHTML="Status : "+t;}
function clearStatus(){status.innerHTML="Status : Arahkan mouse ke hotspot gampong";}
c.addEventListener('wheel',e=>{e.preventDefault();scale+=(e.deltaY<0?0.1:-0.1);if(scale<.5)scale=.5;render();});
c.addEventListener("pointerdown", function(e){

    if(e.target.closest(".hotspot")) return;

    dragging = true;
    sx = e.clientX - x;
    sy = e.clientY - y;

    c.setPointerCapture(e.pointerId);
});

c.addEventListener("pointermove", function(e){

    if(!dragging) return;

    x = e.clientX - sx;
    y = e.clientY - sy;

    render();

});

c.addEventListener("pointerup", function(){

    dragging = false;

});

c.addEventListener("pointercancel", function(){

    dragging = false;

});
</script>
</body>
</html>
