<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>USULAN MUSRENA 2027 | Peta Kota Banda Aceh</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#edf2f7;
overflow:hidden;

}

/* ================= HEADER ================= */

header{

height:80px;

background:#004d99;

color:white;

display:flex;

align-items:center;

padding:0 25px;

box-shadow:0 3px 12px rgba(0,0,0,.2);

}

header img{

height:60px;

margin-right:18px;

}

header h1{

font-size:26px;

font-weight:700;

}

header p{

font-size:14px;

opacity:.9;

}

/* ================= MAP AREA ================= */

.wrapper{

height:calc(100vh - 80px);

padding:15px;

}

.map-area{

position:relative;

width:100%;

height:100%;

background:white;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 25px rgba(0,0,0,.15);

}

/* ================= TOOLBAR ================= */

.toolbar{

position:absolute;

top:15px;

right:15px;

display:flex;

flex-direction:column;

gap:10px;

z-index:1000;

}

.toolbar button{

width:48px;

height:48px;

border:none;

border-radius:10px;

background:#004d99;

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;

transition:.25s;

box-shadow:0 4px 10px rgba(0,0,0,.25);

}

.toolbar button:hover{

background:#0066cc;

}

/* ================= STATUS ================= */

.status{

position:absolute;

left:20px;

top:20px;

padding:10px 18px;

background:#27ae60;

color:white;

border-radius:30px;

font-size:14px;

z-index:1000;

box-shadow:0 3px 10px rgba(0,0,0,.25);

}

/* ================= MAP ================= */

#mapContainer{

width:100%;

height:100%;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

cursor:grab;

}

#mapContainer:active{

cursor:grabbing;

}

#mapImage{

transform-origin:center center;

transition:transform .08s linear;

user-select:none;

max-width:none;

}

/* ================= FOOTER ================= */

.footer{

position:absolute;

bottom:15px;

left:20px;

background:rgba(255,255,255,.9);

padding:10px 18px;

border-radius:25px;

font-size:13px;

box-shadow:0 2px 8px rgba(0,0,0,.15);

}

.footer a{

text-decoration:none;

color:#004d99;

font-weight:600;

margin-right:15px;

}

.footer a:hover{

color:#e67e22;

}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

header h1{

font-size:18px;

}

header p{

font-size:12px;

}

header img{

height:45px;

}

.toolbar button{

width:42px;

height:42px;

font-size:18px;

}

.status{

font-size:12px;

}

}

</style>

</head>

<body>

<header>

<img src="images/logo_bna.png">

<div>

<h1>USULAN MUSRENA 2027</h1>

<p>Pemerintah Kota Banda Aceh</p>

</div>

</header>

<div class="wrapper">

<div class="map-area">

<div class="status">
? Siap Memilih Gampong
</div>

<div class="toolbar">

<button onclick="zoomIn()">+</button>

<button onclick="zoomOut()">-</button>

<button onclick="resetZoom()">¦</button>

</div>

<div id="mapContainer">

<img id="mapImage" src="images/peta_bna.jpg" draggable="false">

</div>

<div class="footer">

<a href="index.html"><< Kembali</a>

<a href="index.html">Beranda</a>

</div>

</div>

</div>

<script>

const map=document.getElementById("mapImage");

const container=document.getElementById("mapContainer");

let scale=1;

let posX=0;

let posY=0;

let isDragging=false;

let startX,startY;

/* ================= UPDATE ================= */

function updateMap(){

map.style.transform=
`translate(${posX}px,${posY}px) scale(${scale})`;

}

/* ================= BUTTON ================= */

function zoomIn(){

scale+=0.2;

updateMap();

}

function zoomOut(){

if(scale>0.4){

scale-=0.2;

updateMap();

}

}

function resetZoom(){

scale=1;

posX=0;

posY=0;

updateMap();

}

/* ================= WHEEL ================= */

container.addEventListener("wheel",function(e){

e.preventDefault();

if(e.deltaY<0){

scale+=0.1;

}else{

scale-=0.1;

if(scale<0.4){

scale=0.4;

}

}

updateMap();

});

/* ================= DRAG ================= */

container.addEventListener("mousedown",function(e){

isDragging=true;

startX=e.clientX-posX;

startY=e.clientY-posY;

});

window.addEventListener("mouseup",function(){

isDragging=false;

});

window.addEventListener("mousemove",function(e){

if(!isDragging)return;

posX=e.clientX-startX;

posY=e.clientY-startY;

updateMap();

});

/* ================= TOUCH ================= */

container.addEventListener("touchstart",function(e){

isDragging=true;

startX=e.touches[0].clientX-posX;

startY=e.touches[0].clientY-posY;

});

container.addEventListener("touchmove",function(e){

if(!isDragging)return;

posX=e.touches[0].clientX-startX;

posY=e.touches[0].clientY-startY;

updateMap();

});

container.addEventListener("touchend",function(){

isDragging=false;

});

updateMap();

</script>

</body>
</html>
